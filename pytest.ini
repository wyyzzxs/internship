[pytest]
# 测试发现(继承默认,显式写出来方便 CI 跑)
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = -ra --tb=short --strict-markers

# pytest-timeout(第三轮):本仓库未装 pytest-timeout 包,
# 如要加,先在 requirements.txt 加 pytest-timeout,再启用 timeout = 30
# timeout = 30
